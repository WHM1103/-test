<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人專屬稅務帳戶 · App 模擬介面</title>
<style>
  :root{
    --brand:#13294B; --brand2:#20416B; --gold:#D99A2B; --gold-d:#B57F1E; --teal:#1C7293;
    --red:#D64545; --green:#2E9E6B; --bg:#EEF1F6; --card:#FFFFFF; --ink:#1A2233;
    --muted:#6B7688; --line:#E7EBF1; --soft:#F4F6FA;
    --font:"Noto Sans TC","PingFang TC","Microsoft JhengHei","微軟正黑體","Heiti TC",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--font);background:
    radial-gradient(1200px 700px at 20% 0%, #1b2c4a 0%, #0e1626 55%, #0a111e 100%);
    color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;gap:64px;padding:24px}

  /* side caption (desktop) */
  #caption{max-width:340px;color:#dfe7f3}
  #caption .logo{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  #caption .logo .mk{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-d));
    display:grid;place-items:center;color:var(--brand);box-shadow:0 8px 20px rgba(217,154,43,.35)}
  #caption .logo .mk svg{width:26px;height:26px;fill:currentColor}
  #caption .logo b{font-size:21px;color:#fff;letter-spacing:.02em}
  #caption h1{font-size:30px;line-height:1.25;color:#fff;font-weight:900;margin-bottom:14px}
  #caption p{font-size:15px;line-height:1.7;color:#aebbcf;margin-bottom:22px}
  #caption .tags{display:flex;flex-wrap:wrap;gap:9px}
  #caption .tag{font-size:12.5px;color:#e7edf6;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.05);border-radius:999px;padding:7px 14px}
  #caption .hint{margin-top:26px;font-size:13px;color:#8fa0b8;display:flex;align-items:center;gap:8px}
  #caption .hint .dot{width:8px;height:8px;border-radius:999px;background:var(--gold);
    box-shadow:0 0 0 0 rgba(217,154,43,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(217,154,43,.55)}70%{box-shadow:0 0 0 10px rgba(217,154,43,0)}100%{box-shadow:0 0 0 0 rgba(217,154,43,0)}}

  /* phone */
  #device{transform-origin:center center}
  .phone{width:390px;height:844px;background:#000;border-radius:52px;padding:13px;
    box-shadow:0 40px 90px rgba(0,0,0,.55), inset 0 0 0 2px #23262d;position:relative}
  .screen-shell{width:100%;height:100%;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;
    display:flex;flex-direction:column}
  .notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:126px;height:30px;background:#000;
    border-radius:0 0 18px 18px;z-index:40}

  /* status bar */
  .statusbar{height:46px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 26px 6px;font-size:14px;font-weight:700;color:#fff;position:relative;z-index:30}
  .statusbar.dark{color:var(--ink)}
  .statusbar .r{display:flex;align-items:center;gap:6px}
  .statusbar .bat{width:22px;height:11px;border:1.5px solid currentColor;border-radius:3px;position:relative;opacity:.9}
  .statusbar .bat::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:currentColor;border-radius:1px}
  .statusbar .bat i{position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:70%;background:currentColor;border-radius:1px}
  .statusbar .sig{display:flex;align-items:flex-end;gap:1.5px;height:11px}
  .statusbar .sig b{width:3px;background:currentColor;border-radius:1px}
  .statusbar .sig b:nth-child(1){height:4px}.statusbar .sig b:nth-child(2){height:6px}
  .statusbar .sig b:nth-child(3){height:8px}.statusbar .sig b:nth-child(4){height:11px}

  /* scroll area */
  .screen{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
  .screen::-webkit-scrollbar{display:none}
  .screen{scrollbar-width:none}
  .view{animation:fade .32s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes slidein{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  .pushed{animation:slidein .3s ease}

  /* headers */
  .hero{background:linear-gradient(160deg,var(--brand) 0%,var(--brand2) 100%);color:#fff;
    padding:6px 20px 22px;border-radius:0 0 26px 26px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-50px;width:180px;height:180px;border-radius:999px;
    background:rgba(255,255,255,.05)}
  .hero .top{display:flex;align-items:center;gap:12px;position:relative;z-index:2}
  .hero .av{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.16);display:grid;place-items:center}
  .hero .av svg{width:26px;height:26px;fill:#fff}
  .hero .hi{flex:1}
  .hero .hi .s{font-size:12.5px;color:#c9d6ea;opacity:.9}
  .hero .hi .n{font-size:18px;font-weight:800;margin-top:1px}
  .bell{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.12);display:grid;place-items:center;position:relative;cursor:pointer}
  .bell svg{width:19px;height:19px;fill:#fff}
  .bell .bg{position:absolute;top:8px;right:9px;min-width:16px;height:16px;padding:0 4px;background:var(--gold);
    color:var(--brand);font-size:10px;font-weight:900;border-radius:999px;display:grid;place-items:center}

  .hstat{display:flex;gap:10px;margin-top:16px;position:relative;z-index:2}
  .hstat .st{flex:1;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:11px 12px}
  .hstat .st .l{font-size:11px;color:#c3d1e6}
  .hstat .st .v{font-size:17px;font-weight:900;margin-top:3px;letter-spacing:.02em}
  .hstat .st .v small{font-size:11px;font-weight:700}
  .hstat .st.warn .v{color:var(--gold)}

  /* sub header for tabs */
  .subhead{background:linear-gradient(160deg,var(--brand),var(--brand2));color:#fff;padding:8px 20px 20px;border-radius:0 0 26px 26px}
  .subhead .t{font-size:20px;font-weight:900}
  .subhead .d{font-size:12.5px;color:#c9d6ea;margin-top:4px;display:flex;align-items:center;gap:6px}
  .subhead .d svg{width:13px;height:13px;fill:#c9d6ea}
  .subhead .maplink{margin-left:auto;color:var(--gold-lt,#F0C56A);font-weight:700;display:flex;align-items:center;gap:3px}

  /* push header */
  .phead{background:var(--brand);color:#fff;display:flex;align-items:center;gap:6px;padding:6px 12px 16px}
  .phead .back{width:40px;height:40px;display:grid;place-items:center;cursor:pointer;border-radius:12px}
  .phead .back:active{background:rgba(255,255,255,.12)}
  .phead .back svg{width:20px;height:20px;fill:#fff}
  .phead .tt{font-size:18px;font-weight:800}

  /* body */
  .body{padding:16px}
  .sect{margin-top:20px}
  .sect:first-child{margin-top:0}
  .sect .st{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:11px;display:flex;align-items:center;gap:7px}
  .sect .st .more{margin-left:auto;font-size:12.5px;color:var(--teal);font-weight:700;cursor:pointer}

  .card{background:var(--card);border-radius:18px;box-shadow:0 6px 18px rgba(23,38,66,.07);overflow:hidden}
  .pad{padding:16px}

  /* due reminder */
  .due{background:linear-gradient(135deg,#fff 0%,#fff7f4 100%);border:1px solid #f6dcd6;border-radius:18px;padding:15px;
    box-shadow:0 8px 22px rgba(214,69,69,.10)}
  .due .h{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--red);font-size:14.5px;margin-bottom:12px}
  .due .h svg{width:17px;height:17px;fill:var(--red)}
  .due .h .n{margin-left:auto;font-size:12px;color:#fff;background:var(--red);border-radius:999px;padding:2px 9px}
  .dueitem{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px dashed #f0ddd7}
  .dueitem:first-of-type{border-top:none}
  .dueitem .ic{width:40px;height:40px;border-radius:12px;background:#fdeeea;display:grid;place-items:center;flex:none}
  .dueitem .ic svg{width:20px;height:20px;fill:var(--red)}
  .dueitem .m{flex:1;min-width:0}
  .dueitem .m .nm{font-size:14.5px;font-weight:700}
  .dueitem .m .dl{font-size:11.5px;color:var(--muted);margin-top:2px}
  .dueitem .m .dl b{color:var(--red)}
  .dueitem .amt{text-align:right}
  .dueitem .amt .a{font-size:16px;font-weight:900;color:var(--ink)}
  .btn-pay{margin-top:5px;font-size:11.5px;font-weight:800;color:var(--brand);background:var(--gold);
    border:none;border-radius:999px;padding:5px 12px;cursor:pointer}
  .btn-pay:active{transform:scale(.96)}

  /* service tiles */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .tile{background:var(--card);border-radius:16px;padding:15px 8px;text-align:center;cursor:pointer;
    box-shadow:0 6px 16px rgba(23,38,66,.06);transition:.15s}
  .tile:active{transform:scale(.96)}
  .tile .ci{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;margin:0 auto 8px}
  .tile .ci svg{width:24px;height:24px;fill:#fff}
  .tile.c1 .ci{background:linear-gradient(135deg,#1E3A5F,#13294B)}
  .tile.c2 .ci{background:linear-gradient(135deg,#1C7293,#155a75)}
  .tile.c3 .ci{background:linear-gradient(135deg,#E0A93B,#c48f24)}
  .tile .tn{font-size:13px;font-weight:800;color:var(--ink)}
  .tile .td{font-size:10.5px;color:var(--muted);margin-top:2px}

  /* function grid */
  .fns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:var(--card);border-radius:18px;padding:16px 8px;
    box-shadow:0 6px 18px rgba(23,38,66,.07)}
  .fn{text-align:center;cursor:pointer;padding:6px 2px;border-radius:12px;transition:.15s}
  .fn:active{background:var(--soft);transform:scale(.95)}
  .fn .ci{width:46px;height:46px;border-radius:14px;background:var(--soft);display:grid;place-items:center;margin:0 auto 7px}
  .fn .ci svg{width:22px;height:22px;fill:var(--brand)}
  .fn.g .ci{background:#fbf3e2}.fn.g .ci svg{fill:var(--gold-d)}
  .fn.t .ci{background:#e7f1f4}.fn.t .ci svg{fill:var(--teal)}
  .fn .fl{font-size:11.5px;color:var(--ink);font-weight:600;line-height:1.2}

  /* promo */
  .promo{background:linear-gradient(120deg,#fbf1dc 0%,#fdf8ee 100%);border:1px solid #efdcb4;border-radius:18px;
    padding:15px;display:flex;gap:13px;cursor:pointer;box-shadow:0 8px 20px rgba(217,154,43,.12)}
  .promo:active{transform:scale(.99)}
  .promo .ci{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--gold),var(--gold-d));
    display:grid;place-items:center;flex:none}
  .promo .ci svg{width:22px;height:22px;fill:#fff}
  .promo .m .tg{font-size:11px;font-weight:800;color:var(--gold-d);letter-spacing:.04em}
  .promo .m .tx{font-size:13px;color:var(--ink);line-height:1.5;margin-top:3px;font-weight:600}
  .promo .go{align-self:center;color:var(--gold-d)}
  .promo .go svg{width:16px;height:16px;fill:currentColor}

  /* generic list */
  .list{background:var(--card);border-radius:18px;box-shadow:0 6px 18px rgba(23,38,66,.07);overflow:hidden}
  .li{display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer;border-top:1px solid var(--line)}
  .li:first-child{border-top:none}
  .li:active{background:var(--soft)}
  .li .ci{width:42px;height:42px;border-radius:12px;background:var(--soft);display:grid;place-items:center;flex:none}
  .li .ci svg{width:20px;height:20px;fill:var(--brand)}
  .li .m{flex:1;min-width:0}
  .li .m .nm{font-size:14.5px;font-weight:700;color:var(--ink)}
  .li .m .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .li .rt{text-align:right;flex:none}
  .li .rt .a{font-size:15px;font-weight:900}
  .li .chev{color:#c3cbd8}
  .li .chev svg{width:15px;height:15px;fill:currentColor}

  .status{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;display:inline-block}
  .status.paid{background:#e6f5ee;color:var(--green)}
  .status.unpaid{background:#fdeaea;color:var(--red)}
  .status.done{background:#e9eef7;color:var(--teal)}

  /* buttons */
  .btn{width:100%;border:none;border-radius:15px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}
  .btn:active{transform:scale(.985)}
  .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--brand);box-shadow:0 10px 24px rgba(217,154,43,.3)}
  .btn-navy{background:var(--brand);color:#fff}
  .btn-ghost{background:#fff;color:var(--brand);border:1.5px solid var(--line)}

  /* chips */
  .chips{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto}
  .chip{font-size:12.5px;font-weight:700;padding:7px 15px;border-radius:999px;background:#fff;color:var(--muted);
    border:1px solid var(--line);cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}

  /* login */
  .login{min-height:100%;background:linear-gradient(165deg,var(--brand) 0%,#0f2038 60%,#0b1a30 100%);
    color:#fff;padding:40px 30px 30px;display:flex;flex-direction:column}
  .login .brand{display:flex;flex-direction:column;align-items:center;margin-top:34px}
  .login .brand .mk{width:76px;height:76px;border-radius:22px;background:linear-gradient(135deg,var(--gold),var(--gold-d));
    display:grid;place-items:center;box-shadow:0 16px 36px rgba(217,154,43,.4)}
  .login .brand .mk svg{width:40px;height:40px;fill:var(--brand)}
  .login .brand h2{font-size:23px;font-weight:900;margin-top:18px;letter-spacing:.03em}
  .login .brand p{font-size:13px;color:#a9bad4;margin-top:8px;text-align:center;line-height:1.6}
  .login .slogan{text-align:center;font-size:13px;color:var(--gold-lt,#F0C56A);margin-top:14px;font-weight:700}
  .login .auth{margin-top:auto}
  .login .auth .lbl{font-size:12.5px;color:#9fb0c9;margin-bottom:12px;text-align:center}
  .authbtn{display:flex;align-items:center;gap:14px;width:100%;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:15px 16px;margin-bottom:11px;cursor:pointer;
    color:#fff;font-family:inherit;transition:.15s}
  .authbtn:active{transform:scale(.98);background:rgba(255,255,255,.14)}
  .authbtn .ci{width:42px;height:42px;border-radius:12px;background:rgba(217,154,43,.9);display:grid;place-items:center;flex:none}
  .authbtn .ci svg{width:21px;height:21px;fill:var(--brand)}
  .authbtn .m{text-align:left;flex:1}
  .authbtn .m .t{font-size:15px;font-weight:800}
  .authbtn .m .s{font-size:11.5px;color:#a9bad4;margin-top:1px}
  .authbtn .go svg{width:15px;height:15px;fill:#8296b3}
  .login .note{text-align:center;font-size:11px;color:#7c8ca6;margin-top:14px}

  /* section headers small */
  .grp{font-size:12.5px;font-weight:800;color:var(--muted);margin:20px 4px 9px;letter-spacing:.02em}
  .grp:first-child{margin-top:4px}

  /* toggle row */
  .trow{display:flex;align-items:center;gap:13px;padding:14px 16px;border-top:1px solid var(--line)}
  .trow:first-child{border-top:none}
  .trow .ci{width:38px;height:38px;border-radius:11px;background:var(--soft);display:grid;place-items:center;flex:none}
  .trow .ci svg{width:18px;height:18px;fill:var(--brand)}
  .trow .m{flex:1}
  .trow .m .t{font-size:14px;font-weight:700}
  .trow .m .s{font-size:11.5px;color:var(--muted);margin-top:1px}
  .tg{width:44px;height:26px;border-radius:999px;background:#d3d9e3;position:relative;flex:none;cursor:pointer;transition:.2s}
  .tg::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:999px;background:#fff;
    transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
  .tg.on{background:var(--green)}.tg.on::after{left:21px}

  /* pay */
  .payhead{background:var(--card);border-radius:18px;padding:22px;text-align:center;box-shadow:0 6px 18px rgba(23,38,66,.07)}
  .payhead .lbl{font-size:13px;color:var(--muted)}
  .payhead .amt{font-size:38px;font-weight:900;color:var(--ink);margin-top:6px;letter-spacing:.01em}
  .payhead .amt small{font-size:18px;margin-right:3px}
  .payhead .nm{font-size:14px;color:var(--teal);font-weight:700;margin-top:6px}
  .kv{display:flex;justify-content:space-between;padding:13px 0;border-top:1px solid var(--line);font-size:13.5px}
  .kv:first-child{border-top:none}
  .kv .k{color:var(--muted)}.kv .v{font-weight:700;color:var(--ink)}
  .paymethod{display:flex;align-items:center;gap:12px;padding:14px 16px;border-top:1px solid var(--line);cursor:pointer}
  .paymethod:first-child{border-top:none}
  .paymethod .ci{width:40px;height:40px;border-radius:11px;background:var(--soft);display:grid;place-items:center}
  .paymethod .ci svg{width:19px;height:19px;fill:var(--brand)}
  .paymethod .m{flex:1;font-size:14px;font-weight:700}
  .paymethod .rd{width:20px;height:20px;border-radius:999px;border:2px solid #cfd6e1}
  .paymethod.sel .rd{border-color:var(--gold);background:radial-gradient(circle,var(--gold) 40%,transparent 46%)}

  .done{padding:50px 24px;text-align:center}
  .done .ok{width:96px;height:96px;border-radius:999px;background:#e6f5ee;display:grid;place-items:center;margin:0 auto 22px;
    animation:pop .5s cubic-bezier(.2,1.3,.5,1)}
  .done .ok svg{width:52px;height:52px;fill:var(--green)}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .done h3{font-size:22px;font-weight:900;color:var(--ink)}
  .done p{font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.6}
  .done .rc{background:#fff;border-radius:16px;padding:16px;margin:22px 0;text-align:left;box-shadow:0 6px 16px rgba(23,38,66,.07)}

  /* chat */
  .chatwrap{display:flex;flex-direction:column;height:100%}
  .chatbody{flex:1;overflow-y:auto;padding:16px;background:var(--bg);display:flex;flex-direction:column;gap:12px}
  .chatbody::-webkit-scrollbar{display:none}
  .msg{max-width:78%;padding:11px 14px;font-size:14px;line-height:1.55;border-radius:16px;animation:fade .3s ease}
  .msg.bot{align-self:flex-start;background:#fff;color:var(--ink);border-bottom-left-radius:5px;box-shadow:0 3px 10px rgba(23,38,66,.08)}
  .msg.me{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:5px}
  .botrow{display:flex;gap:9px;align-items:flex-end;max-width:88%}
  .botrow .av{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--teal),#155a75);
    display:grid;place-items:center;flex:none}
  .botrow .av svg{width:17px;height:17px;fill:#fff}
  .quick{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;background:var(--bg)}
  .quick .q{font-size:12.5px;font-weight:700;color:var(--teal);background:#fff;border:1px solid #d7e3e8;
    border-radius:999px;padding:8px 14px;cursor:pointer}
  .quick .q:active{background:#eef5f7}
  .chatbar{display:flex;gap:10px;padding:12px 16px;background:#fff;border-top:1px solid var(--line);align-items:center}
  .chatbar .inp{flex:1;background:var(--soft);border-radius:999px;padding:11px 16px;font-size:13px;color:var(--muted)}
  .chatbar .snd{width:42px;height:42px;border-radius:999px;background:var(--brand);display:grid;place-items:center;flex:none;cursor:pointer}
  .chatbar .snd svg{width:18px;height:18px;fill:#fff}

  /* qr card */
  .qrcard{background:var(--card);border-radius:18px;padding:20px;text-align:center;box-shadow:0 6px 18px rgba(23,38,66,.07)}
  .qrcard .qi{width:150px;height:150px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:14px;
    display:grid;place-items:center;padding:10px}
  .qrcard .qi svg{width:100%;height:100%}
  .qrcard .code{font-size:22px;font-weight:900;color:var(--brand);margin-top:14px;letter-spacing:.08em}
  .qrcard .cl{font-size:12px;color:var(--muted);margin-top:3px}

  .info-note{display:flex;gap:9px;background:#eef3fa;border-radius:12px;padding:12px 13px;font-size:12px;color:#40536e;line-height:1.55;margin-top:14px}
  .info-note svg{width:16px;height:16px;fill:var(--teal);flex:none;margin-top:1px}

  /* tab bar */
  .tabbar{flex:none;display:flex;background:#fff;border-top:1px solid var(--line);padding:8px 6px 22px;
    box-shadow:0 -4px 20px rgba(23,38,66,.06)}
  .tab{flex:1;text-align:center;cursor:pointer;padding:4px 0;color:#9aa6b6}
  .tab .ci{height:24px;display:grid;place-items:center}
  .tab .ci svg{width:22px;height:22px;fill:currentColor}
  .tab .tl{font-size:10.5px;font-weight:700;margin-top:3px}
  .tab.on{color:var(--brand)}
  .tab.on .ci svg{fill:var(--brand)}
  .homebar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:999px;
    background:rgba(0,0,0,.18);z-index:35}
  .no-tabs .tabbar{display:none}

  /* floating AI */
  .fab{position:absolute;right:16px;bottom:96px;width:56px;height:56px;border-radius:999px;
    background:linear-gradient(135deg,var(--teal),#134f68);display:grid;place-items:center;cursor:pointer;z-index:25;
    box-shadow:0 12px 26px rgba(28,114,147,.45)}
  .fab svg{width:26px;height:26px;fill:#fff}
  .fab .pin{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:999px;background:var(--gold);border:2px solid #fff}

  @media (max-width:920px){#caption{display:none}#wrap{gap:0}}
</style>
</head>

function toggleRow(icon,t,s,on){

    <span class="m"><div class="t">${t}</div><div class="s">${s}</div></span>
    <span class="tg ${on?'on':''}" data-toggle="1"></span></div>`;
}
function qrSVG(){
  // deterministic pseudo-QR
  let cells="";const g=13,size=150,c=size/g;let seed=7;
  const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
  for(let y=0;y<g;y++)for(let x=0;x<g;x++){ if(rnd()>0.5) cells+=`<rect x="${x*c}" y="${y*c}" width="${c}" height="${c}" fill="#13294B"/>`; }
  const eye=(ex,ey)=>`<rect x="${ex}" y="${ey}" width="${c*3}" height="${c*3}" fill="none" stroke="#13294B" stroke-width="${c}"/>
    <rect x="${ex+c}" y="${ey+c}" width="${c}" height="${c}" fill="#13294B"/>`;
  return `<svg viewBox="0 0 ${size} ${size}">${cells}${eye(0,0)}${eye(size-c*3,0)}${eye(0,size-c*3)}</svg>`;
}

/* ---------------- render ---------------- */
function render(){
  if(!state.logged){ shell.classList.add("no-tabs"); statusbar.classList.add("dark"); screenEl.innerHTML=loginView(); screenEl.scrollTop=0; return; }
  statusbar.classList.toggle("dark", state.stack.length>0 && ["records","docs","notifications","map","calc","chat","paydone","promo","pay"].includes(state.stack[state.stack.length-1].id));

  let html;
  if(state.stack.length){
    shell.classList.add("no-tabs");
    const top=state.stack[state.stack.length-1];
    html = PUSHED[top.id](top.params);
  }else{
    shell.classList.remove("no-tabs");
    html = ({home:homeView,national:nationalView,local:localView,einvoice:einvoiceView,profile:profileView})[state.tab]();
  }
  screenEl.innerHTML = html;
  screenEl.scrollTop = 0;

  // tab bar active
  tabbarEl.innerHTML = TAB_META.map(t=>`<div class="tab ${state.tab===t.id?'on':''}" data-tab="${t.id}">
    <div class="ci">${ic(t.icon)}</div><div class="tl">${t.label}</div></div>`).join("");

  // floating AI on tab roots (not chat/profile)
  const old=document.getElementById("fab"); if(old) old.remove();
  if(!state.stack.length && state.tab!=="profile"){
    const fab=document.createElement("div"); fab.id="fab"; fab.className="fab";
    fab.innerHTML=`<span class="pin"></span>${ic("robot")}`;
    fab.onclick=()=>go("chat");
    shell.appendChild(fab);
  }

  if(state.stack.length && state.stack[state.stack.length-1].id==="chat"){
    if(state.chat.length===0){ chatPush("bot","您好，我是稅務智能客服 🤖<br>整合國稅・地方稅・雲端發票諮詢，請問需要什麼協助？"); }
    renderChat();
  }
}

/* ---------------- events ---------------- */
document.addEventListener("click",(e)=>{
  const t=e.target.closest("[data-login],[data-logout],[data-tab],[data-nav],[data-back],[data-pay],[data-method],[data-payconfirm],[data-home],[data-toggle],[data-filter],[data-q]");
  if(!t) return;
  if(t.dataset.login!==undefined){ state.logged=true; state.tab="home"; state.stack=[]; render(); return; }
  if(t.dataset.logout!==undefined){ state.logged=false; state.stack=[]; state.chat=[]; render(); return; }
  if(t.dataset.tab){ setTab(t.dataset.tab); return; }
  if(t.dataset.nav){ go(t.dataset.nav); return; }
  if(t.dataset.back!==undefined){ back(); return; }
  if(t.dataset.home!==undefined){ setTab("home"); return; }
  if(t.dataset.pay!==undefined){ const d=DUE.find(x=>x.id===t.dataset.pay); if(d){state.payItem=d;state.payMethod=0;} go("pay"); return; }
  if(t.dataset.method!==undefined){ state.payMethod=+t.dataset.method;
    document.querySelectorAll("#methods .paymethod").forEach((m,i)=>m.classList.toggle("sel",i===state.payMethod)); return; }
  if(t.dataset.payconfirm!==undefined){ state.stack.pop(); state.stack.push({id:"paydone",params:{}}); render(); return; }
  if(t.dataset.toggle!==undefined){ t.classList.toggle("on"); return; }
  if(t.dataset.filter){
    document.querySelectorAll("#recChips .chip").forEach(c=>c.classList.toggle("on",c===t));
    const f=t.dataset.filter;
    const rows = f==="all"?RECORDS : f==="unpaid"?RECORDS.filter(r=>r.status==="unpaid"):RECORDS.filter(r=>r.cat===f);
    document.getElementById("recList").innerHTML=listOf(rows); return;
  }
  if(t.dataset.q){
    const q=t.dataset.q;
    if(q==="__demo"){ chatPush("me","請問稅務帳戶有哪些功能？"); }
    else chatPush("me", t.textContent);
    renderChat();
    const ans = botReply(q);
    setTimeout(()=>{ chatPush("bot",ans); renderChat(); },550);
    return;
  }
});

/* clock + scale */
function tick(){ const d=new Date(); document.getElementById("clock").textContent=
  String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function fit(){ const s=Math.min(1,(window.innerHeight-40)/844); document.getElementById("device").style.transform=`scale(${s})`; }
window.addEventListener("resize",fit);
tick(); setInterval(tick,10000); fit();
render();
